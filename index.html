<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒窖管理系统</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0f0b08;
    --surface:  #1a1208;
    --card:     #211608;
    --border:   #3a2a12;
    --gold:     #c9a84c;
    --gold-dim: #7d6530;
    --wine:     #8b1a2e;
    --wine-lt:  #b52340;
    --cream:    #f0e6cc;
    --muted:    #7a6a50;
    --text:     #e8d9b8;
    --danger:   #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon { font-size: 20px; }

  .nav-tabs {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    padding: 7px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.02em;
  }

  .nav-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
  .nav-btn.active { background: var(--wine); color: var(--cream); border-color: var(--wine); }

  /* ── Panels ── */
  .panel { display: none; padding: 40px 32px; max-width: 960px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ── Search Panel ── */
  .search-hero {
    text-align: center;
    margin-bottom: 40px;
  }

  .search-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .search-hero p {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.03em;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    max-width: 560px;
    margin: 0 auto 36px;
  }

  .search-bar input {
    flex: 1;
    padding: 13px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border .2s;
  }

  .search-bar input:focus { border-color: var(--gold-dim); }
  .search-bar input::placeholder { color: var(--muted); }

  .btn-gold {
    padding: 13px 24px;
    background: var(--gold);
    border: none;
    color: #0f0b08;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background .2s;
  }

  .btn-gold:hover { background: #d9b85c; }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: start;
    margin-bottom: 14px;
  }

  .result-card.out-of-stock { opacity: 0.55; }

  .wine-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .wine-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .coord-display {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .coord-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 64px;
  }

  .coord-label {
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .coord-value {
    color: var(--cream);
    font-size: 18px;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
  }

  .stock-badge {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: center;
    white-space: nowrap;
    align-self: flex-start;
  }

  .stock-badge.ok { background: rgba(80,160,80,.15); color: #7ec97e; border: 1px solid rgba(80,160,80,.3); }
  .stock-badge.low { background: rgba(200,160,40,.1); color: #c9a84c; border: 1px solid rgba(200,160,40,.3); }
  .stock-badge.empty { background: rgba(180,40,40,.1); color: #e07070; border: 1px solid rgba(180,40,40,.3); }

  /* Wine list grid */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .wine-mini {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .2s;
  }

  .wine-mini:hover { border-color: var(--gold-dim); }

  .wine-mini .wine-name { font-size: 15px; margin-bottom: 4px; }
  .wine-mini .wine-meta { margin-bottom: 8px; }

  .mini-coord {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  /* ── Admin Panel ── */
  .admin-login {
    max-width: 400px;
    margin: 60px auto;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
  }

  .admin-login h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    margin-bottom: 8px;
    font-size: 22px;
  }

  .admin-login p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  .form-group { margin-bottom: 16px; text-align: left; }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border .2s;
  }

  .form-input:focus { border-color: var(--gold-dim); }
  .form-input::placeholder { color: var(--muted); }

  .btn-wine {
    width: 100%;
    padding: 12px;
    background: var(--wine);
    border: none;
    color: var(--cream);
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background .2s;
    margin-top: 8px;
  }

  .btn-wine:hover { background: var(--wine-lt); }

  /* Admin dashboard */
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .admin-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
  }

  .btn-sm {
    padding: 8px 18px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.04em;
    font-weight: 600;
    border: none;
    transition: all .2s;
  }

  .btn-add { background: var(--gold); color: #0f0b08; }
  .btn-add:hover { background: #d9b85c; }
  .btn-logout { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-logout:hover { color: var(--text); border-color: var(--muted); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 18px 20px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 600;
  }

  /* Table */
  .wine-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .wine-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .wine-table td {
    padding: 13px 14px;
    border-bottom: 1px solid rgba(58,42,18,.5);
    vertical-align: middle;
  }

  .wine-table tr:hover td { background: rgba(201,168,76,.04); }

  .table-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--cream);
  }

  .table-coord {
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .action-btns { display: flex; gap: 6px; }

  .btn-edit {
    padding: 5px 12px;
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .2s;
  }

  .btn-edit:hover { border-color: var(--gold-dim); color: var(--gold); }

  .btn-del {
    padding: 5px 12px;
    font-size: 11px;
    background: transparent;
    border: 1px solid rgba(180,40,40,.3);
    color: #e07070;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .2s;
  }

  .btn-del:hover { background: rgba(180,40,40,.15); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    width: 480px;
    max-width: 95vw;
    padding: 36px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 20px;
    margin-bottom: 24px;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }

  .btn-cancel:hover { color: var(--text); }

  .btn-save {
    padding: 10px 24px;
    background: var(--gold);
    border: none;
    color: #0f0b08;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }

  .btn-save:hover { background: #d9b85c; }

  .msg { padding: 10px 14px; font-size: 13px; margin-top: 10px; }
  .msg.error { background: rgba(180,40,40,.1); color: #e07070; border: 1px solid rgba(180,40,40,.3); }
  .msg.success { background: rgba(80,160,80,.1); color: #7ec97e; border: 1px solid rgba(80,160,80,.3); }

  .no-result { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }
  .no-result span { display: block; font-size: 32px; margin-bottom: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  .tag { 
    display: inline-block;
    padding: 2px 8px;
    background: rgba(139,26,46,.2);
    border: 1px solid rgba(139,26,46,.4);
    color: #c97080;
    font-size: 11px;
    letter-spacing: 0.03em;
    margin-left: 8px;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .panel { padding: 24px 16px; }
    .stats-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .wine-table th:nth-child(3), .wine-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-icon">🍷</span> Cave à Vin</div>
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="showPanel('search')">查询酒款</button>
    <button class="nav-btn" onclick="showPanel('admin')">管理后台</button>
  </div>
</header>

<div class="panel active" id="panel-search">
  <div class="search-hero">
    <h1>查找您的藏酒</h1>
    <p>输入酒款名称，即刻获取存放坐标</p>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="输入酒款名称、产区或年份…" oninput="doSearch()" />
    <button class="btn-gold" onclick="doSearch()">查 找</button>
  </div>

  <div id="searchResults"></div>

  <div class="section-title" style="margin-top:40px;">
    所有藏酒 <span id="totalCount" style="font-size:12px;color:var(--muted);font-family:'Inter',sans-serif;"></span>
  </div>
  <div class="wine-grid" id="allWinesGrid"></div>
</div>

<div class="panel" id="panel-admin">
  <div id="adminLogin">
    <div class="admin-login">
      <h2>管理员登录</h2>
      <p>请输入管理员密码以访问后台</p>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" id="adminPwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')adminLogin()" />
      </div>
      <button class="btn-wine" onclick="adminLogin()">进入管理后台</button>
      <div id="loginMsg"></div>
    </div>
  </div>

  <div id="adminDash" style="display:none">
    <div class="admin-header">
      <h2>酒款管理</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm btn-add" onclick="openModal()">＋ 添加酒款</button>
        <button class="btn-sm btn-logout" onclick="adminLogout()">退出</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">酒款总数</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">总库存（瓶）</div>
        <div class="stat-value" id="statStock">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">库存不足（≤3瓶）</div>
        <div class="stat-value" id="statLow" style="color:#c9a84c;">—</div>
      </div>
    </div>

    <table class="wine-table">
      <thead>
        <tr>
          <th>酒款名称</th>
          <th>坐标位置</th>
          <th>年份 / 产区</th>
          <th>库存</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="adminTableBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modalTitle">添加酒款</h3>
    <input type="hidden" id="editId" />

    <div class="form-group">
      <label>酒款名称 *</label>
      <input type="text" class="form-input" id="fName" placeholder="例：Château Margaux 2015" />
    </div>
    <div class="form-group">
      <label>年份</label>
      <input type="text" class="form-input" id="fVintage" placeholder="例：2015" />
    </div>
    <div class="form-group">
      <label>产区 / 备注</label>
      <input type="text" class="form-input" id="fRegion" placeholder="例：Bordeaux, France" />
    </div>

    <div class="section-title" style="margin:18px 0 14px;font-size:13px;">存放坐标</div>
    <div class="form-row">
      <div class="form-group">
        <label>区域 (Zone)</label>
        <input type="text" class="form-input" id="fZone" placeholder="例：A" />
      </div>
      <div class="form-group">
        <label>列 (Column)</label>
        <input type="text" class="form-input" id="fCol" placeholder="例：3" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>行 (Row)</label>
        <input type="text" class="form-input" id="fRow" placeholder="例：2" />
      </div>
      <div class="form-group">
        <label>层 (Level)</label>
        <input type="text" class="form-input" id="fLevel" placeholder="例：4" />
      </div>
    </div>
    <div class="form-group">
      <label>库存数量（瓶）*</label>
      <input type="number" class="form-input" id="fStock" placeholder="例：6" min="0" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveWine()">保存</button>
    </div>
    <div id="modalMsg"></div>
  </div>
</div>

<script>
// ── Data ──
const ADMIN_PWD = 'cave2024';

let wines = JSON.parse(localStorage.getItem('cave_wines') || 'null') || [
  { id:1, name:'Château Margaux', vintage:'2015', region:'Bordeaux, France', zone:'A', col:'1', row:'1', level:'3', stock:6 },
  { id:2, name:'Opus One', vintage:'2018', region:'Napa Valley, USA', zone:'A', col:'2', row:'1', level:'2', stock:3 },
  { id:3, name:'Sassicaia', vintage:'2017', region:'Tuscany, Italy', zone:'B', col:'1', row:'2', level:'1', stock:8 },
  { id:4, name:'Penfolds Grange', vintage:'2016', region:'South Australia', zone:'B', col:'3', row:'1', level:'4', stock:2 },
  { id:5, name:'Dom Pérignon', vintage:'2012', region:'Champagne, France', zone:'C', col:'1', row:'1', level:'1', stock:12 },
  { id:6, name:'Screaming Eagle', vintage:'2019', region:'Napa Valley, USA', zone:'A', col:'3', row:'2', level:'3', stock:1 },
  { id:7, name:'Romanée-Conti', vintage:'2014', region:'Burgundy, France', zone:'D', col:'1', row:'1', level:'2', stock:2 },
  { id:8, name:'Caymus Special Selection', vintage:'2020', region:'Napa Valley, USA', zone:'B', col:'2', row:'3', level:'2', stock:5 },
  { id:9, name:'Tignanello', vintage:'2018', region:'Tuscany, Italy', zone:'C', col:'2', row:'1', level:'3', stock:7 },
  { id:10, name:'Silver Oak', vintage:'2017', region:'Sonoma, USA', zone:'C', col:'3', row:'2', level:'1', stock:0 },
];

let nextId = wines.length ? Math.max(...wines.map(w=>w.id)) + 1 : 1;
let isAdmin = false;

function save() {
  localStorage.setItem('cave_wines', JSON.stringify(wines));
}

// ── Coord display ──
function coordStr(w) {
  return `${w.zone || '—'}-${w.col || '—'}-${w.row || '—'}-${w.level || '—'}`;
}

function coordChips(w) {
  const fields = [
    { label:'区域', val: w.zone  },
    { label:'列',   val: w.col   },
    { label:'行',   val: w.row   },
    { label:'层',   val: w.level },
  ];
  return fields.map(f => `
    <div class="coord-chip">
      <span class="coord-label">${f.label}</span>
      <span class="coord-value">${f.val || '—'}</span>
    </div>
  `).join('');
}

function stockBadge(s) {
  if (s === 0) return `<span class="stock-badge empty">已售罄</span>`;
  if (s <= 3)  return `<span class="stock-badge low">${s} 瓶（库存偏低）</span>`;
  return `<span class="stock-badge ok">${s} 瓶</span>`;
}

// ── Search ──
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const el = document.getElementById('searchResults');
  if (!q) { el.innerHTML = ''; renderAll(); return; }

  const hits = wines.filter(w =>
    w.name.toLowerCase().includes(q) ||
    (w.vintage || '').includes(q) ||
    (w.region || '').toLowerCase().includes(q)
  );

  if (!hits.length) {
    el.innerHTML = `<div class="no-result"><span>🔍</span>未找到与"${q}"匹配的酒款</div>`;
    return;
  }

  el.innerHTML = hits.map(w => `
    <div class="result-card ${w.stock===0?'out-of-stock':''}">
      <div>
        <div class="wine-name">${w.name}${w.stock===0?'<span class="tag">已售罄</span>':''}</div>
        <div class="wine-meta">${w.vintage || ''}${w.vintage && w.region ? ' · ' : ''}${w.region || ''}</div>
        <div class="coord-display">${coordChips(w)}</div>
      </div>
      <div>${stockBadge(w.stock)}</div>
    </div>
  `).join('');
}

function renderAll() {
  const grid = document.getElementById('allWinesGrid');
  const count = document.getElementById('totalCount');
  count.textContent = `共 ${wines.length} 款`;
  grid.innerHTML = wines.map(w => `
    <div class="wine-mini" onclick="quickFind('${w.name}')">
      <div class="wine-name">${w.name}</div>
      <div class="wine-meta">${w.vintage || ''}${w.vintage && w.region ? ' · ' : ''}${w.region || ''}</div>
      <div class="mini-coord">📍 ${coordStr(w)}</div>
    </div>
  `).join('');
}

function quickFind(name) {
  document.getElementById('searchInput').value = name;
  doSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Panels ──
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'search') renderAll();
  if (id === 'admin' && isAdmin) renderAdminTable();
}

// ── Admin ──
function adminLogin() {
  const pwd = document.getElementById('adminPwd').value;
  const msg = document.getElementById('loginMsg');
  if (pwd === ADMIN_PWD) {
    isAdmin = true;
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminDash').style.display = 'block';
    renderAdminTable();
  } else {
    msg.innerHTML = '<div class="msg error">密码错误，请重试</div>';
  }
}

function adminLogout() {
  isAdmin = false;
  document.getElementById('adminLogin').style.display = 'block';
  document.getElementById('adminDash').style.display = 'none';
  document.getElementById('adminPwd').value = '';
  document.getElementById('loginMsg').innerHTML = '';
}

function renderAdminTable() {
  const total = wines.length;
  const totalStock = wines.reduce((s, w) => s + w.stock, 0);
  const lowStock = wines.filter(w => w.stock <= 3).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statStock').textContent = totalStock;
  document.getElementById('statLow').textContent = lowStock;

  const tbody = document.getElementById('adminTableBody');
  tbody.innerHTML = wines.map(w => `
    <tr>
      <td>
        <div class="table-name">${w.name}</div>
      </td>
      <td><span class="table-coord">📍 ${coordStr(w)}</span></td>
      <td style="color:var(--muted);font-size:12px;">${w.vintage || '—'} / ${w.region || '—'}</td>
      <td>${stockBadge(w.stock)}</td>
      <td>
        <div class="action-btns">
          <button class="btn-edit" onclick="openModal(${w.id})">编辑</button>
          <button class="btn-del" onclick="deleteWine(${w.id})">删除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Modal ──
function openModal(id) {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('hidden');
  document.getElementById('modalMsg').innerHTML = '';

  if (id) {
    const w = wines.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = '编辑酒款';
    document.getElementById('editId').value = id;
    document.getElementById('fName').value    = w.name;
    document.getElementById('fVintage').value = w.vintage || '';
    document.getElementById('fRegion').value  = w.region  || '';
    document.getElementById('fZone').value    = w.zone    || '';
    document.getElementById('fCol').value     = w.col     || '';
    document.getElementById('fRow').value     = w.row     || '';
    document.getElementById('fLevel').value   = w.level   || '';
    document.getElementById('fStock').value   = w.stock;
  } else {
    document.getElementById('modalTitle').textContent = '添加酒款';
    document.getElementById('editId').value = '';
    ['fName','fVintage','fRegion','fZone','fCol','fRow','fLevel','fStock'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveWine() {
  const name  = document.getElementById('fName').value.trim();
  const stock = parseInt(document.getElementById('fStock').value);
  const msg   = document.getElementById('modalMsg');

  if (!name) { msg.innerHTML = '<div class="msg error">请输入酒款名称</div>'; return; }
  if (isNaN(stock) || stock < 0) { msg.innerHTML = '<div class="msg error">请输入有效的库存数量</div>'; return; }

  const data = {
    name,
    vintage: document.getElementById('fVintage').value.trim(),
    region:  document.getElementById('fRegion').value.trim(),
    zone:    document.getElementById('fZone').value.trim().toUpperCase(),
    col:     document.getElementById('fCol').value.trim(),
    row:     document.getElementById('fRow').value.trim(),
    level:   document.getElementById('fLevel').value.trim(),
    stock,
  };

  const editId = document.getElementById('editId').value;
  if (editId) {
    const idx = wines.findIndex(w => w.id === parseInt(editId));
    wines[idx] = { ...wines[idx], ...data };
  } else {
    wines.push({ id: nextId++, ...data });
  }

  save();
  renderAdminTable();
  renderAll();
  msg.innerHTML = '<div class="msg success">保存成功！</div>';
  setTimeout(closeModal, 900);
}

function deleteWine(id) {
  if (!confirm('确认删除此酒款？此操作不可撤销。')) return;
  wines = wines.filter(w => w.id !== id);
  save();
  renderAdminTable();
  renderAll();
}

// ── Init ──
renderAll();
</script>
</body>
</html>
